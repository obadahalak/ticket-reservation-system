
version: '3.7'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: app.root
      MYSQL_PASSWORD: app.root
    ports:
      - "3306:3306"  
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network  

  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - vendor_data:/var/www/vendor
      - .:/var/www
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network
  redis:
      image: redis:alpine
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      networks:
        - app-network
networks:
  app-network:
    driver: bridge
    
volumes:
  mysql_data:
  redis_data:
  vendor_data: